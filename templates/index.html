<!DOCTYPE html>
<html>
<head>
    <title>Weather App</title>
</head>
<body>
    <h1>🌤️ Weather App</h1>
    <form method="POST">
        <input type="text" name="city" placeholder="City ka naam likho" required>
        <button type="submit">Search</button>
    </form>

    {% if weather %}
        <h2>{{ weather.city }}</h2>
        <p>🌡️ Temperature: {{ weather.temp }}°C</p>
        <p>💧 Humidity: {{ weather.humidity }}%</p>
        <p>☁️ {{ weather.description }}</p>
    {% endif %}

    {% if error %}
        <p style="color:red;">{{ error }}</p>
    {% endif %}
</body>
</html>
